---
- name: "Ironic Networking - (re)starting ironic-networking service"
  service:
    name: ironic-networking
    state: restarted
    enabled: yes
  when: enable_ironic_networking | bool

- name: "Stop ironic-networking if it is disabled"
  service:
    name: ironic-networking
    state: stopped
    enabled: no
  ignore_errors: true
  when: not enable_ironic_networking | bool

- name: "Remove ironic-networking service if it is disabled"
  file:
    path: "{{ init_dest_dir }}ironic-networking.service"
    state: absent
  when: not enable_ironic_networking | bool
