---
- name: "Check which image files exist for upload"
  stat:
    path: "{{ item }}"
  register: image_files_to_upload
  with_items:
    - "{{ dib_imagename }}"
    - "{{ dib_imagename }}.{{ dib_imagetype | default('qcow2') }}"
    - "{{ dib_imagename }}.kernel"
    - "{{ dib_imagename }}.initramfs"
    - "{{ dib_imagename }}.vmlinuz"

- name: "Set fact for existing image files"
  set_fact:
    existing_image_files: "{{ image_files_to_upload.results | selectattr('stat.exists') | map(attribute='item') | list }}"

- name: "Display files to upload to registry"
  debug:
    msg: "Will upload {{ existing_image_files | length }} file(s) to OCI registry: {{ existing_image_files }}"
  when: existing_image_files | length > 0

- name: "Attempt to login to the OCI registry"
  # NOTE(TheJulia): This is only really valid for when digest authentication
  # is used, but should also provide insight for debugging as a separate step.
  when: registry_password | length > 0
  shell: |
    set -o pipefail
    echo "{{ registry_password }}" | {{ bifrost_venv_dir }}/bin/oras login \
      {{ registry_url }} \
      --username "{{ registry_username }}" \
      --password-stdin \
      {% if not upload_registry_enable_tls | bool %} --plain-http {% endif %} \
      {% if upload_registry_insecure | bool %}--insecure{% endif %}

- name: "Upload image files to OCI registry"
  shell: |
    set -o pipefail -e
    IMAGE_FILE="{{ item }}"
    IMAGE_BASENAME=$(basename "${IMAGE_FILE}")
    IMAGE_TAG="{{ registry_repository }}:${IMAGE_BASENAME}-{{ registry_tag_suffix }}"

    echo "Uploading ${IMAGE_FILE} to {{ registry_url }}/${IMAGE_TAG}"

    echo "{{ registry_password }}" | {{ bifrost_venv_dir }}/bin/oras push \
      {{ registry_url }}/${IMAGE_TAG} \
      "${IMAGE_FILE}:application/octet-stream" \
      --username "{{ registry_username }}" \
      --password-stdin \
      --annotation "org.opencontainers.image.title=${IMAGE_BASENAME}" \
      --annotation "org.opencontainers.image.created={{ ansible_date_time.iso8601 }}" \
      --annotation "org.opencontainers.image.description=Bifrost disk image" \
      --annotation "bifrost.image.type={{ 'ramdisk' if build_ramdisk | bool else 'disk' }}" \
      --annotation "bifrost.dib.os_element={{ dib_os_element }}" \
      --disable-path-validation \
      {% if not upload_registry_enable_tls | bool %} --plain-http {% endif %} \
      {% if upload_registry_insecure | bool %}--insecure{% endif %} \
      --verbose

    echo "OCI_ARTIFACT_URL=oci://{{ registry_url }}/${IMAGE_TAG}"
  args:
    executable: /bin/bash
  environment: "{{ bifrost_venv_env }}"
  register: oras_upload_result
  with_items: "{{ existing_image_files }}"
  when: existing_image_files | length > 0
  become: yes
  become_user: ironic

- name: "Extract OCI artifact URLs from upload results"
  set_fact:
    oci_artifact_urls: "{{ oras_upload_result.results | map(attribute='stdout_lines') | map('select', 'match', '^OCI_ARTIFACT_URL=') | flatten | map('regex_replace', '^OCI_ARTIFACT_URL=', '') | list }}"
  when:
    - oras_upload_result is defined
    - oras_upload_result.results is defined

- name: "Display OCI artifact URLs"
  debug:
    msg: "OCI artifact URLs: {{ oci_artifact_urls }}"
  when: oci_artifact_urls is defined and oci_artifact_urls | length > 0

- name: "Save OCI artifact URLs to file"
  copy:
    content: |
      {% for url in oci_artifact_urls %}
      {{ url }}
      {% endfor %}
    dest: "{{ dib_imagename }}.oci-urls.txt"
    mode: "0644"
  when: oci_artifact_urls is defined and oci_artifact_urls | length > 0

- name: "Identify and set primary disk image OCI URL"
  set_fact:
    oci_primary_disk_image_url: "{{ oci_artifact_urls | select('search', '\\.' + (dib_imagetype | default('qcow2'))) | first | default('') }}"
  when:
    - oci_artifact_urls is defined
    - oci_artifact_urls | length > 0

- name: "Write primary disk image OCI URL to file"
  copy:
    content: "{{ oci_primary_disk_image_url }}"
    dest: "{{ dib_imagename }}.oci-primary-url.txt"
    mode: "0644"
  when:
    - oci_primary_disk_image_url is defined
    - oci_primary_disk_image_url | length > 0

- name: "Display primary disk image OCI URL"
  debug:
    msg: "Primary disk image OCI URL: {{ oci_primary_disk_image_url }}"
  when: oci_primary_disk_image_url is defined
